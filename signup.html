<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ثبت نام</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background-color: white;
            width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #11998e;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 0 2px rgba(17, 153, 142, 0.15);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #11998e;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0f7f76;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .back {
            margin-top: 15px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            color: #11998e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>ثبت نام</h2>

    <input type="text" id="username" placeholder="نام کاربری">
    <input type="email" id="email" placeholder="ایمیل (مثال: example@email.com)" dir="ltr">
    <input type="tel" id="phone" placeholder="شماره موبایل (مثال: 09123456789)" dir="ltr">
    <input type="password" id="password" placeholder="رمز عبور">
    <input type="password" id="repassword" placeholder="تکرار رمز عبور">

    <button onclick="signup()">ثبت نام</button>

    <div id="message" class="message"></div>

    <div class="back">
        <a href="index.html">بازگشت به صفحه ورود</a>
    </div>
</div>

<script>
    function signup() {
        let username = document.getElementById("username").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let password = document.getElementById("password").value;
        let repassword = document.getElementById("repassword").value;
        let message = document.getElementById("message");

        // بررسی پر بودن همه فیلدها
        if (!username || !email || !phone || !password || !repassword) {
            message.innerHTML = "❌ لطفاً همه فیلدها را پر کنید";
            message.className = "message error";
            return;
        }

        // اعتبارسنجی ایمیل
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            message.innerHTML = "❌ فرمت ایمیل وارد شده صحیح نیست";
            message.className = "message error";
            return;
        }

        // اعتبارسنجی شماره موبایل ایران (09xxxxxxxxx)
        let phoneRegex = /^09[0-9]{9}$/;
        if (!phoneRegex.test(phone)) {
            message.innerHTML = "❌ شماره موبایل باید با 09 شروع شود و ۱۱ رقم باشد";
            message.className = "message error";
            return;
        }

        // بررسی تطابق رمز عبور
        if (password !== repassword) {
            message.innerHTML = "❌ رمز عبور و تکرار آن یکسان نیست";
            message.className = "message error";
            return;
        }

        // دریافت لیست کاربران از localStorage
        let users = JSON.parse(localStorage.getItem("users") || "[]");
        
        // چک کردن تکراری نبودن نام کاربری، ایمیل و موبایل
        if (users.find(u => u.username === username)) {
            message.innerHTML = "❌ این نام کاربری قبلاً استفاده شده است";
            message.className = "message error";
            return;
        }

        if (users.find(u => u.email === email)) {
            message.innerHTML = "❌ این ایمیل قبلاً ثبت شده است";
            message.className = "message error";
            return;
        }

        if (users.find(u => u.phone === phone)) {
            message.innerHTML = "❌ این شماره موبایل قبلاً ثبت شده است";
            message.className = "message error";
            return;
        }

        // حذف از لیست حذف‌شده‌ها در صورت ثبت‌نام مجدد
        var deleted = JSON.parse(localStorage.getItem("deletedUsers") || "[]");
        deleted = deleted.filter(function(u) { return u !== username; });
        localStorage.setItem("deletedUsers", JSON.stringify(deleted));

        // اضافه کردن کاربر جدید
        users.push({
            username: username,
            email: email,
            phone: phone,
            password: password
        });
        
        // ذخیره لیست کاربران
        localStorage.setItem("users", JSON.stringify(users));
        localStorage.setItem("username", username);
        
        message.innerHTML = "✅ ثبت نام شما با موفقیت انجام شد";
        message.className = "message success";
        
        // انتقال به صفحه اکانت بعد از 2 ثانیه
        setTimeout(function() {
            window.location.href = "Account.html";
        }, 2000);
    }
</script>

</body>
</html>

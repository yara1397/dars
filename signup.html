<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ثبت نام</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background-color: white;
            width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #11998e;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 0 2px rgba(17, 153, 142, 0.15);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #11998e;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0f7f76;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .back {
            margin-top: 15px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            color: #11998e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>ثبت نام</h2>

    <input type="text" id="username" placeholder="نام کاربری">
    <input type="email" id="email" placeholder="ایمیل (مثال: example@email.com)" dir="ltr">
    <input type="tel" id="phone" placeholder="شماره موبایل (مثال: 09123456789)" dir="ltr">
    <input type="password" id="password" placeholder="رمز عبور">
    <input type="password" id="repassword" placeholder="تکرار رمز عبور">

    <button onclick="signup()">ثبت نام</button>

    <div id="message" class="message"></div>

    <div class="back">
        <a href="index.html">بازگشت به صفحه ورود</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-client.js"></script>
<script>
    async function signup() {
        let username = document.getElementById("username").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let password = document.getElementById("password").value;
        let repassword = document.getElementById("repassword").value;
        let message = document.getElementById("message");

        if (!window.firebaseClient) {
            message.innerHTML = "❌ تنظیمات Firebase انجام نشده است";
            message.className = "message error";
            return;
        }

        if (!username || !email || !phone || !password || !repassword) {
            message.innerHTML = "❌ لطفاً همه فیلدها را پر کنید";
            message.className = "message error";
            return;
        }

        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            message.innerHTML = "❌ فرمت ایمیل وارد شده صحیح نیست";
            message.className = "message error";
            return;
        }

        let phoneRegex = /^09[0-9]{9}$/;
        if (!phoneRegex.test(phone)) {
            message.innerHTML = "❌ شماره موبایل باید با 09 شروع شود و ۱۱ رقم باشد";
            message.className = "message error";
            return;
        }

        if (password !== repassword) {
            message.innerHTML = "❌ رمز عبور و تکرار آن یکسان نیست";
            message.className = "message error";
            return;
        }

        try {
            // ابتدا کاربر را در Firebase Auth ثبت می‌کنیم
            // یکتایی ایمیل توسط Firebase Auth بررسی می‌شود
            const cred = await window.firebaseClient.auth.createUserWithEmailAndPassword(email, password);
            const uid = cred.user.uid;

            // ساخت پروفایل در Firestore
            // نکته: role: "user" و isDeleted: false باید حتماً باشند (طبق Rules)
            await window.firebaseClient.db.collection("users").doc(uid).set({
                uid: uid,
                username: username,
                email: email,
                phone: phone,
                role: "user",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                isDeleted: false
            });

            message.innerHTML = "✅ ثبت نام شما با موفقیت انجام شد";
            message.className = "message success";

            setTimeout(function() {
                window.location.href = "Account.html";
            }, 1500);
        } catch (error) {
            if (error.code === "auth/email-already-in-use") {
                message.innerHTML = "❌ این ایمیل قبلاً ثبت شده است";
            } else if (error.code === "auth/weak-password") {
                message.innerHTML = "❌ رمز عبور باید حداقل ۶ کاراکتر باشد";
            } else {
                message.innerHTML = "❌ خطا در ثبت‌نام: " + error.message;
            }
            message.className = "message error";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام</title>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-client.js"></script>
    <style>
        body { 
            font-family: Tahoma; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .form { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%; 
            max-width: 400px;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px;
            box-sizing: border-box;
        }
        .password-wrap{
            position: relative;
            width: 100%;
        }
        .password-wrap input{
            padding-left: 48px;
        }
        .toggle-pass{
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 0;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .toggle-pass:hover{
            background: rgba(78, 205, 196, 0.15);
        }
        .toggle-pass svg{
            width: 22px;
            height: 22px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #4ecdc4; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            margin: 10px 0;
        }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
            display: none;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
            display: none;
        }
        .show { display: block !important; }
        .step { 
            display: inline-block; 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            background: #ddd; 
            margin: 0 10px; 
            transition: all 0.3s;
        }
        .step.active { background: #4ecdc4; transform: scale(1.2); }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-left: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="form">
        <!-- مراحل -->
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <h2 style="text-align: center; margin-bottom: 20px;">ثبت‌نام</h2>

        <!-- پیام‌ها -->
        <div id="successMsg" class="success"></div>
        <div id="errorMsg" class="error"></div>

        <!-- فرم -->
        <form id="registerForm">
            <input type="text" id="name" placeholder="نام کامل" required>
            <input type="email" id="email" placeholder="ایمیل" required>
            <div class="password-wrap">
                <input type="password" id="password" placeholder="رمز عبور (حداقل ۶ کاراکتر)" required>
                <button type="button" id="togglePasswordBtn" class="toggle-pass" aria-label="نمایش/مخفی کردن رمز عبور">
                    <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
                        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a18.3 18.3 0 0 1-4.06 5.19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.11 6.11C3.73 7.84 2 12 2 12s3.5 7 10 7c1.44 0 2.76-.24 3.95-.67" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <input type="password" id="confirmPassword" placeholder="تکرار رمز عبور" required>
            
            <button type="button" id="sendCodeBtn">📧 ارسال کد تأیید</button>
            
            <!-- تأیید کد -->
            <div id="verifySection" style="display: none;">
                <input type="text" id="verifyCode" placeholder="کد ۶ رقمی" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
                <button type="button" id="verifyBtn">✅ تأیید کد</button>
            </div>
            
            <button type="submit" id="registerBtn" disabled>🎉 ثبت‌نام</button>
        </form>
    </div>

    <script>
        // ======== EmailJS Config ========
        const EMAILJS_CONFIG = {
            publicKey: 'zYCifVUI7N8zCbdLV',
            serviceId: 'service_abc123def456xyz',
            templateId: 'template_jydj2zf'
        };
        emailjs.init(EMAILJS_CONFIG.publicKey);

        let emailVerified = false;
        let generatedCode = null;
        let passwordVisible = false;

        // بروزرسانی مراحل
        function updateSteps(step) {
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`step${i}`).classList.toggle('active', i == step);
            }
        }

        // نمایش پیام
        function showMessage(text, type) {
            const success = document.getElementById('successMsg');
            const error = document.getElementById('errorMsg');
            success.textContent = text;
            error.textContent = text;
            success.classList.toggle('show', type === 'success');
            error.classList.toggle('show', type === 'error');
        }

        // نمایش/مخفی رمز عبور
        document.getElementById('togglePasswordBtn').onclick = () => {
            passwordVisible = !passwordVisible;
            document.getElementById('password').type = passwordVisible ? 'text' : 'password';
            document.getElementById('eyeOpen').style.display = passwordVisible ? 'none' : 'block';
            document.getElementById('eyeClosed').style.display = passwordVisible ? 'block' : 'none';
        };

        // ارسال کد تأیید
        document.getElementById('sendCodeBtn').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirmPassword) {
                showMessage('همه فیلدها را پر کنید', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('رمز عبور باید حداقل ۶ کاراکتر باشد', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('رمز عبور و تکرار آن یکسان نیست', 'error');
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = 'در حال ارسال... <span class="spinner"></span>';

            try {
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

                await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
                    to_email: email,
                    to_name: name,
                    verification_code: generatedCode
                });

                document.getElementById('verifySection').style.display = 'block';
                updateSteps(2);
                showMessage('✉️ کد به ایمیل ارسال شد', 'success');
                document.getElementById('verifyCode').focus();

            } catch (err) {
                showMessage('خطا در ارسال ایمیل: ' + (err?.text || err?.message || 'مشکل ناشناخته'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📧 ارسال کد تأیید';
            }
        };

        // تأیید کد
        document.getElementById('verifyBtn').onclick = () => {
            const code = document.getElementById('verifyCode').value;
            if (code === generatedCode) {
                emailVerified = true;
                updateSteps(3);
                document.getElementById('registerBtn').disabled = false;
                showMessage('✅ ایمیل تأیید شد! حالا ثبت‌نام کنید', 'success');
            } else {
                showMessage('❌ کد اشتباه است', 'error');
            }
        };

        // =====================================
        // ✅ ثبت‌نام با Firebase Auth + Firestore
        // =====================================
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();

            if (!emailVerified) {
                showMessage('ابتدا کد را تأیید کنید', 'error');
                return;
            }

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('رمز عبور و تکرار آن یکسان نیست', 'error');
                return;
            }

            // بررسی اینکه Firebase لود شده
            if (!window.firebaseClient) {
                showMessage('خطا: Firebase بارگذاری نشده. صفحه را رفرش کنید', 'error');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = 'در حال ثبت‌نام... <span class="spinner"></span>';

            try {
                const { auth, db } = window.firebaseClient;

                // ۱. ساخت اکانت در Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // ۲. بروزرسانی نام در Firebase Auth
                await user.updateProfile({ displayName: name });

                // ۳. ذخیره اطلاعات در Firestore (کالکشن users)
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    name: name,
                    username: name,
                    email: email,
                    phone: '',
                    role: 'user',
                    isDeleted: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showMessage('🎉 ثبت‌نام موفق! در حال انتقال به پنل...', 'success');

                // ۴. انتقال به صفحه اکانت
                setTimeout(() => {
                    window.location.href = 'Account.html';
                }, 1500);

            } catch (err) {
                // پیام‌های خطای فارسی
                let msg = 'خطا در ثبت‌نام';
                if (err.code === 'auth/email-already-in-use') {
                    msg = 'این ایمیل قبلاً ثبت شده است';
                } else if (err.code === 'auth/weak-password') {
                    msg = 'رمز عبور خیلی ضعیف است (حداقل ۶ کاراکتر)';
                } else if (err.code === 'auth/invalid-email') {
                    msg = 'فرمت ایمیل اشتباه است';
                } else if (err.code === 'auth/network-request-failed') {
                    msg = 'خطای اتصال به اینترنت';
                } else {
                    msg = err.message || 'خطای ناشناخته';
                }
                showMessage('❌ ' + msg, 'error');
                btn.disabled = false;
                btn.innerHTML = '🎉 ثبت‌نام';
            }
        };

        // فقط عدد برای کد
        document.getElementById('verifyCode').oninput = (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
        };
    </script>
</body>
</html>

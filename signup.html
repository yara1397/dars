<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | EmailJS واقعی</title>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { 
            font-family: Tahoma; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .form { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%; 
            max-width: 400px;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px;
            box-sizing: border-box;
        }
        .password-wrap{
            position: relative;
            width: 100%;
        }
        .password-wrap input{
            padding-left: 48px; /* جا برای دکمه چشم */
        }
        .toggle-pass{
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 0;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .toggle-pass:hover{
            background: rgba(78, 205, 196, 0.15);
        }
        .toggle-pass svg{
            width: 22px;
            height: 22px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #4ecdc4; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            margin: 10px 0;
        }
        button:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
            display: none;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
            display: none;
        }
        .show { display: block !important; }
        .step { 
            display: inline-block; 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            background: #ddd; 
            margin: 0 10px; 
            transition: all 0.3s;
        }
        .step.active { background: #4ecdc4; transform: scale(1.2); }
    </style>
</head>
<body>
    <div class="form">
        <!-- مراحل -->
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <h2 style="text-align: center; margin-bottom: 20px;">ثبت‌نام</h2>

        <!-- پیام‌ها -->
        <div id="successMsg" class="success"></div>
        <div id="errorMsg" class="error"></div>

        <!-- فرم -->
        <form id="registerForm">
            <input type="text" id="name" placeholder="نام کامل" required>
            <input type="email" id="email" placeholder="ایمیل" required>
            <div class="password-wrap">
                <input type="password" id="password" placeholder="رمز عبور" required>
                <button type="button" id="togglePasswordBtn" class="toggle-pass" aria-label="نمایش/مخفی کردن رمز عبور">
                    <!-- eye icon -->
                    <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
                        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M10.58 10.58A3 3 0 0 0 12 15a3 3 0 0 0 2.42-4.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a18.3 18.3 0 0 1-4.06 5.19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.11 6.11C3.73 7.84 2 12 2 12s3.5 7 10 7c1.44 0 2.76-.24 3.95-.67" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <input type="password" id="confirmPassword" placeholder="تکرار رمز عبور" required>
            
            <button type="button" id="sendCodeBtn">📧 ارسال کد تأیید</button>
            
            <!-- تأیید کد -->
            <div id="verifySection" style="display: none;">
                <input type="text" id="verifyCode" placeholder="کد ۶ رقمی" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
                <button type="button" id="verifyBtn">✅ تأیید کد</button>
            </div>
            
            <button type="submit" id="registerBtn" disabled>🎉 ثبت‌نام</button>
        </form>
    </div>

    <!-- 👇 SCRIPT مهم - دقیقاً اینجا 👇 -->
    <script>
        // 🔥 ۳ خط جادویی - فقط اینجا عوض کن!
        const EMAILJS_CONFIG = {
            publicKey: 'zYCifVUI7N8zCbdLV',     // از Account
            serviceId: 'service_abc123def456xyz',      // از Email Services  
            templateId: 'template_jydj2zf'     // از Email Templates
        };

        // راه‌اندازی
        emailjs.init(EMAILJS_CONFIG.publicKey);
        
        let emailVerified = false;
        let generatedCode = null; // کد تصادفی هر بار ساخته می‌شود
        let passwordVisible = false;

        // بروزرسانی مراحل
        function updateSteps(step) {
            for(let i=1; i<=3; i++) {
                document.getElementById(`step${i}`).classList.toggle('active', i == step);
            }
        }

        // نمایش پیام
        function showMessage(text, type) {
            const success = document.getElementById('successMsg');
            const error = document.getElementById('errorMsg');
            [success, error].forEach((el, i) => {
                el.textContent = text;
                el.classList.toggle('show', i === (type === 'success' ? 0 : 1));
            });
        }

        // نمایش/مخفی کردن رمز عبور
        document.getElementById('togglePasswordBtn').onclick = () => {
            passwordVisible = !passwordVisible;
            const passInput = document.getElementById('password');
            passInput.type = passwordVisible ? 'text' : 'password';
            document.getElementById('eyeOpen').style.display = passwordVisible ? 'none' : 'block';
            document.getElementById('eyeClosed').style.display = passwordVisible ? 'block' : 'none';
        };

        // ارسال کد
        document.getElementById('sendCodeBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if(!name || !email || !password || !confirmPassword) {
                showMessage('نام، ایمیل و رمز عبور را کامل وارد کنید', 'error');
                return;
            }

            if(password !== confirmPassword) {
                showMessage('رمز عبور و تکرار آن یکسان نیست', 'error');
                return;
            }

            try {
                // ساخت کد ۶ رقمی تصادفی در فرانت
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

                // ارسال واقعی ایمیل!
                await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
                    to_email: email,
                    to_name: name,
                    verification_code: generatedCode
                });
                
                document.getElementById('verifySection').style.display = 'block';
                updateSteps(2);
                // فقط پیام کلی بدون نمایش خود کد
                showMessage('کد به ایمیل ارسال شد', 'success');
                document.getElementById('verifyCode').focus();
                
            } catch(error) {
                showMessage('خطا: ' + (error?.text || error?.message || 'مشکل ناشناخته'), 'error');
            }
        };

        // تأیید کد
        document.getElementById('verifyBtn').onclick = () => {
            const code = document.getElementById('verifyCode').value;
            if(code === generatedCode) {
                emailVerified = true;
                updateSteps(3);
                document.getElementById('registerBtn').disabled = false;
                showMessage('✅ تأیید شد!', 'success');
            } else {
                showMessage('❌ کد اشتباه است', 'error');
            }
        };

        // ثبت‌نام
        document.getElementById('registerForm').onsubmit = (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if(password !== confirmPassword) {
                showMessage('رمز عبور و تکرار آن یکسان نیست', 'error');
                return;
            }
            if(emailVerified) {
                showMessage('🎉 ثبت‌نام موفق!', 'success');
                setTimeout(() => location.reload(), 2000);
            } else {
                showMessage('ابتدا کد را تأیید کنید', 'error');
            }
        };

        // فقط عدد
        document.getElementById('verifyCode').oninput = (e) => {
            e.target.value = e.target.value.replace(/\\D/g, '').slice(0,6);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>آموزش درس</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            width: 800px;
            max-width: 90%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
        }

        .content {
            width: 60%;
            line-height: 2;
            color: #333;
        }

        .auth-box {
            width: 35%;
            background-color: #f5f7ff;
            padding: 20px;
            border-radius: 10px;
        }

        .auth-box h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #2575fc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #2575fc;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5edb;
        }

        .switch {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        .admin-link {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: color 0.3s;
            user-select: none;
        }

        .admin-link:hover {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="content">
        <h2>به سایت ما خوش آمدید</h2>
        <p>
            شما به سادگی می‌توانید در این سایت ثبت‌نام کنید یا وارد حساب کاربری خود شوید.
            این سایت یک پلتفرم آموزشی است که شامل دوره‌های مختلف و محتوای آموزشی می‌باشد.
        </p>
        <p>
             هدف این سایت این است که به شما چیز های باحال و خوب یاد بدهد.
        </p>
    </div>

    <div class="auth-box">
        <h3>ورود</h3>
        <input id="username" type="text" placeholder="ایمیل">
        <input id="password" type="password" placeholder="رمز عبور">
        <button onclick="login()">ورود</button>

        <div class="switch">
            حساب ندارید؟ <strong><a href="signup.html">ثبت نام</a></strong>
        </div>
    </div>
</div>

<a href="admin.html" class="admin-link">⚙</a>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-client.js"></script>
<script>
async function login() {
    let email = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value;

    if (!window.firebaseClient) {
        alert("تنظیمات Firebase انجام نشده است");
        return;
    }

    if (!email || !password) {
        alert("لطفاً ایمیل و رمز عبور را وارد کنید");
        return;
    }

    try {
        const cred = await window.firebaseClient.auth.signInWithEmailAndPassword(email, password);
        const userDoc = await window.firebaseClient.db.collection("users").doc(cred.user.uid).get();
        const profile = userDoc.exists ? userDoc.data() : null;

        if (!profile || profile.isDeleted === true) {
            await window.firebaseClient.auth.signOut();
            alert("⚠️ حساب کاربری شما حذف/غیرفعال شده است");
            return;
        }

        window.location.href = "Account.html";
    } catch (error) {
        if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password" || error.code === "auth/invalid-credential") {
            alert("❌ ایمیل یا رمز عبور اشتباه است");
        } else {
            alert("❌ خطا در ورود: " + error.message);
        }
    }
}

window.onload = function() {
    if (!window.firebaseClient) return;

    window.firebaseClient.auth.onAuthStateChanged(async function(user) {
        if (!user) return;

        try {
            const userDoc = await window.firebaseClient.db.collection("users").doc(user.uid).get();
            const profile = userDoc.exists ? userDoc.data() : null;

            if (!profile || profile.isDeleted === true) {
                await window.firebaseClient.auth.signOut();
                return;
            }

            window.location.href = "Account.html";
        } catch (e) {
            await window.firebaseClient.auth.signOut();
        }
    });
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>آموزش درس</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            width: 800px;
            max-width: 90%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
        }

        .content {
            width: 60%;
            line-height: 2;
            color: #333;
        }

        .auth-box {
            width: 35%;
            background-color: #f5f7ff;
            padding: 20px;
            border-radius: 10px;
        }

        .auth-box h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #2575fc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #2575fc;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5edb;
        }

        .switch {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        /* لینک مخفی ادمین */
        .admin-link {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: color 0.3s;
            user-select: none;
        }

        .admin-link:hover {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- متن توضیحی سمت چپ -->
    <div class="content">
        <h2>به سایت ما خوش آمدید</h2>
        <p>
            شما به سادگی می‌توانید در این سایت ثبت‌نام کنید یا وارد حساب کاربری خود شوید.
            این سایت یک پلتفرم آموزشی است که شامل دوره‌های مختلف و محتوای آموزشی می‌باشد.
        </p>
        <p>
             هدف این سایت این است که به شما چیز های باحال و خوب یاد بدهد.
        </p>
    </div>

    <!-- باکس ورود / ثبت‌نام -->
    <div class="auth-box">
        <h3>ورود</h3>
        <input id="username" type="text" placeholder="نام کاربری">
        <input id="password" type="password" placeholder="رمز عبور">
        <button onclick="login()">ورود</button>

        <div class="switch">
            حساب ندارید؟ <strong><a href="signup.html">ثبت نام</a></strong>
        </div>
    </div>
</div>

<!-- لینک مخفی ادمین - گوشه پایین چپ -->
<a href="admin.html" class="admin-link">⚙</a>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        alert("لطفاً نام کاربری و رمز عبور را وارد کنید");
        return;
    }

    // دریافت لیست کاربران از localStorage
    let users = JSON.parse(localStorage.getItem("users") || "[]");
    
    // جستجوی کاربر با یوزرنیم و پسورد وارد شده
    // چک کردن اینکه آیا یوزرنیم وجود دارد ولی پسورد اشتباه است
    let userExists = users.find(u => u.username === username);
    let user = users.find(u => u.username === username && u.password === password);

    if (!user) {
        if (!userExists) {
            // چک کردن لیست حذف‌شده‌ها
            let deleted = JSON.parse(localStorage.getItem("deletedUsers") || "[]");
            if (deleted.includes(username)) {
                alert("⚠️ حساب کاربری شما توسط ادمین حذف شده است\nلطفاً دوباره ثبت‌نام کنید");
            } else {
                alert("❌ نام کاربری یا رمز عبور اشتباه است");
            }
        } else {
            alert("❌ رمز عبور اشتباه است");
        }
        return;
    }

    // ذخیره نام کاربری برای استفاده در صفحات دیگر
    localStorage.setItem("username", username);

    // ذخیره خودکار یوزرنیم و پسورد بدون پرسیدن
    localStorage.setItem("savedUsername", username);
    localStorage.setItem("savedPassword", password);

    // انتقال به صفحه اکانت
    window.location.href = "Account.html";
}

// پر کردن خودکار فیلدها در صورت وجود اطلاعات ذخیره شده
window.onload = function() {
    let savedUsername = localStorage.getItem("savedUsername");
    let savedPassword = localStorage.getItem("savedPassword");
    
    if (savedUsername) {
        document.getElementById("username").value = savedUsername;
    }
    
    if (savedPassword) {
        document.getElementById("password").value = savedPassword;
    }
}
</script>

</body>
</html>

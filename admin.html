<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پنل ادمین</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; direction: ltr; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        #panel { display: none; background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 900px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: right; font-size: 14px; }
        th { background: #f0f0f0; font-weight: bold; }
        tr:hover { background: #f9f9f9; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: Tahoma; }
        .del-btn:hover { background: #dc2626; }
        #msg { color: red; margin-top: 10px; font-size: 14px; min-height: 20px; }
        .top-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .logout-btn { width: auto; padding: 8px 16px; background: #ef4444; font-size: 14px; border-radius: 6px; border: none; color: white; cursor: pointer; }
        .count { color: #666; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login" class="box">
    <h2>🛡️ پنل ادمین</h2>
    <input type="email" id="u" placeholder="ایمیل ادمین" />
    <input type="password" id="p" placeholder="رمز عبور ادمین" />
    <button onclick="doLogin()">ورود به پنل</button>
    <div id="msg"></div>
</div>

<div id="panel">
    <h2>👥 لیست کاربران ثبت‌نام کرده</h2>
    <div class="top-btns">
        <button class="logout-btn" onclick="doLogout()">🚪 خروج</button>
    </div>
    <div class="count" id="countTxt"></div>
    <div id="tableArea"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-client.js"></script>
<script>
let adminSession = false;

async function doLogin() {
    var email = document.getElementById("u").value.trim();
    var pass = document.getElementById("p").value.trim();
    var msg = document.getElementById("msg");

    if (!window.firebaseClient) {
        msg.innerHTML = "❌ تنظیمات Firebase انجام نشده است";
        return;
    }

    if (!email || !pass) {
        msg.innerHTML = "❌ لطفاً ایمیل و رمز عبور را وارد کنید";
        return;
    }

    try {
        // لاگین واقعی با Firebase Auth
        const cred = await window.firebaseClient.auth.signInWithEmailAndPassword(email, pass);
        const uid = cred.user.uid;

        // بررسی نقش ادمین از Firestore
        const profileDoc = await window.firebaseClient.db.collection("users").doc(uid).get();
        const role = profileDoc.exists ? profileDoc.data().role : null;

        if (role !== "admin") {
            await window.firebaseClient.auth.signOut();
            msg.innerHTML = "❌ شما دسترسی ادمین ندارید";
            return;
        }

        adminSession = true;
        msg.innerHTML = "";
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
        await loadUsers();
    } catch (error) {
        if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password" || error.code === "auth/invalid-credential") {
            msg.innerHTML = "❌ ایمیل یا رمز عبور اشتباه است";
        } else {
            msg.innerHTML = "❌ خطا در ورود: " + error.message;
        }
    }
}

async function doLogout() {
    adminSession = false;
    if (window.firebaseClient) {
        await window.firebaseClient.auth.signOut();
    }
    document.getElementById("login").style.display = "block";
    document.getElementById("panel").style.display = "none";
    document.getElementById("u").value = "";
    document.getElementById("p").value = "";
    document.getElementById("msg").innerHTML = "";
}

async function loadUsers() {
    if (!window.firebaseClient) {
        document.getElementById("tableArea").innerHTML = "<p style='color:#ef4444'>تنظیمات Firebase انجام نشده است</p>";
        return;
    }

    const area = document.getElementById("tableArea");
    const countTxt = document.getElementById("countTxt");

    try {
        const snap = await window.firebaseClient.db.collection("users").get();
        const users = snap.docs
            .map(function(doc) {
                const data = doc.data() || {};
                return {
                    docId: doc.id,
                    uid: data.uid || doc.id,
                    username: data.username || "-",
                    email: data.email || "-",
                    phone: data.phone || "-",
                    role: data.role || "user",
                    isDeleted: data.isDeleted === true
                };
            })
            .filter(function(user) { return user.isDeleted !== true; });

        countTxt.innerHTML = "تعداد کاربران: <strong>" + users.length + "</strong>";

        if (users.length === 0) {
            area.innerHTML = "<p style='color:#999;text-align:center;padding:20px'>هنوز کاربری ثبت‌نام نکرده است</p>";
            return;
        }

        var html = "<table><tr><th>#</th><th>یوزرنیم</th><th>ایمیل</th><th>موبایل</th><th>نقش</th><th>حذف</th></tr>";
        for (var i = 0; i < users.length; i++) {
            var isAdmin = users[i].role === "admin";
            html += "<tr>";
            html += "<td>" + (i+1) + "</td>";
            html += "<td><strong>" + users[i].username + "</strong></td>";
            html += "<td>" + users[i].email + "</td>";
            html += "<td style='direction:ltr'>" + users[i].phone + "</td>";
            html += "<td>" + (isAdmin ? "🛡️ ادمین" : "👤 کاربر") + "</td>";
            if (isAdmin) {
                html += "<td><span style='color:#999;font-size:12px'>—</span></td>";
            } else {
                html += "<td><button class='del-btn' onclick=\"deleteUser('" + users[i].docId + "','" + users[i].uid + "','" + users[i].username + "')\">🗑 حذف</button></td>";
            }
            html += "</tr>";
        }
        html += "</table>";
        area.innerHTML = html;
    } catch (error) {
        area.innerHTML = "<p style='color:#ef4444'>خطا در دریافت کاربران: " + error.message + "</p>";
    }
}

async function deleteUser(docId, uid, username) {
    if (!adminSession) return;
    if (!confirm("آیا از حذف کاربر «" + username + "» مطمئن هستید؟")) return;

    try {
        const { db } = window.firebaseClient;

        // گرفتن ایمیل کاربر قبل از حذف
        const userDoc = await db.collection("users").doc(docId).get();
        const userEmail = userDoc.exists ? userDoc.data().email : null;

        // ۱. حذف سند کاربر از Firestore
        await db.collection("users").doc(docId).delete();

        // ۲. ذخیره در bannedUsers تا نتواند دوباره ثبت‌نام کند
        await db.collection("bannedUsers").doc(uid).set({
            uid: uid,
            email: userEmail || "",
            bannedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("✅ کاربر «" + username + "» با موفقیت حذف شد");
        loadUsers();
    } catch (error) {
        alert("خطا در حذف کاربر: " + error.message);
    }
}

window.addEventListener("load", function () {
    if (!window.firebaseClient) return;

    window.firebaseClient.auth.onAuthStateChanged(async function(user) {
        if (!user) {
            adminSession = false;
            document.getElementById("login").style.display = "block";
            document.getElementById("panel").style.display = "none";
            return;
        }

        try {
            const profileDoc = await window.firebaseClient.db.collection("users").doc(user.uid).get();
            const role = profileDoc.exists ? profileDoc.data().role : null;

            if (role !== "admin") {
                adminSession = false;
                document.getElementById("login").style.display = "block";
                document.getElementById("panel").style.display = "none";
                return;
            }

            // ادمین قبلاً لاگین بوده - مستقیم پنل نشان بده
            adminSession = true;
            document.getElementById("msg").innerHTML = "";
            document.getElementById("login").style.display = "none";
            document.getElementById("panel").style.display = "block";
            await loadUsers();
        } catch (error) {
            document.getElementById("tableArea").innerHTML = "<p style='color:#ef4444'>خطا در احراز هویت ادمین: " + error.message + "</p>";
        }
    });
});

document.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
